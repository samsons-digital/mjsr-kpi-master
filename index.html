<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MJSR KPI Master — Samsons Group</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f5f3ee;
  --cream-dark: #ede9e1;
  --gold: #b8922e;
  --gold-light: #d4aa55;
  --gold-pale: #f0e4c4;
  --dark: #1a1a18;
  --dark-mid: #2c2c28;
  --mid: #5a5a52;
  --muted: #8a8a80;
  --border: #dedad0;
  --white: #ffffff;
  --tier-a-bg: #fff8ee;
  --tier-a-text: #7a4a10;
  --tier-a-border: #e8c080;
  --tier-b-bg: #eef5ee;
  --tier-b-text: #2a5a2a;
  --tier-b-border: #90c090;
  --tier-c-bg: #f2f2f0;
  --tier-c-text: #4a4a44;
  --tier-c-border: #c8c8c0;
  --dw-bg: #f5f0f8;
  --dw-text: #5a3a7a;
  --dw-border: #c8b0e0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--dark);
  min-height: 100vh;
}

/* PIN SCREEN */
#pin-screen {
  position: fixed; inset: 0;
  background: var(--dark);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  flex-direction: column;
  gap: 0;
}
.pin-box {
  text-align: center;
  padding: 56px 48px;
  border: 1px solid #3a3a34;
  background: var(--dark-mid);
  border-radius: 4px;
  min-width: 320px;
}
.pin-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 32px;
}
.pin-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  color: var(--cream);
  font-weight: 400;
  margin-bottom: 6px;
}
.pin-sub {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 36px;
  letter-spacing: 0.5px;
}
.pin-dots {
  display: flex; gap: 14px; justify-content: center; margin-bottom: 32px;
}
.pin-dot {
  width: 12px; height: 12px; border-radius: 50%;
  border: 1px solid #4a4a42;
  background: transparent;
  transition: all 0.2s;
}
.pin-dot.filled { background: var(--gold); border-color: var(--gold); }
.pin-pad {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  max-width: 240px; margin: 0 auto;
}
.pin-key {
  background: #232320; border: 1px solid #3a3a34;
  color: var(--cream); font-family: 'DM Sans', sans-serif;
  font-size: 18px; font-weight: 300;
  padding: 16px; border-radius: 3px;
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.pin-key:hover { background: #2e2e2a; border-color: var(--gold); color: var(--gold); }
.pin-key:active { transform: scale(0.95); }
.pin-key.clear { font-size: 12px; color: var(--muted); letter-spacing: 1px; }
.pin-error {
  color: #e07070; font-size: 12px; margin-top: 16px;
  opacity: 0; transition: opacity 0.3s;
}
.pin-error.show { opacity: 1; }
.pin-version { font-size: 10px; color: #3a3a34; margin-top: 24px; letter-spacing: 1px; }

/* APP */
#app { display: none; }

/* TOP HEADER */
.top-bar {
  background: var(--dark);
  border-bottom: 2px solid var(--gold);
  padding: 0 32px;
  display: flex; align-items: stretch;
  height: 64px;
  position: sticky; top: 0; z-index: 100;
}
.top-bar-left {
  display: flex; align-items: center; gap: 20px;
  flex: 1;
}
.top-bar-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; letter-spacing: 3.5px;
  color: var(--gold); text-transform: uppercase;
}
.top-bar-divider { width: 1px; background: #3a3a34; height: 28px; }
.top-bar-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; color: var(--cream);
  font-weight: 400; letter-spacing: 0.5px;
}
.top-bar-right {
  display: flex; align-items: center; gap: 16px;
}
.top-search {
  background: #2a2a26; border: 1px solid #3a3a34;
  color: var(--cream); font-family: 'DM Sans', sans-serif;
  font-size: 13px; padding: 7px 14px; border-radius: 3px;
  width: 220px; outline: none;
  transition: border-color 0.2s;
}
.top-search::placeholder { color: #5a5a52; }
.top-search:focus { border-color: var(--gold); }
.top-search-icon { color: var(--muted); font-size: 14px; margin-right: -28px; z-index:1; position:relative; left: 24px; pointer-events:none; }
.lock-btn {
  background: none; border: 1px solid #3a3a34;
  color: var(--muted); font-size: 11px; letter-spacing: 1px;
  padding: 6px 14px; border-radius: 3px; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.lock-btn:hover { border-color: var(--gold); color: var(--gold); }

/* STAT BAR */
.stat-bar {
  background: var(--dark-mid);
  border-bottom: 1px solid #3a3a34;
  padding: 0 32px;
  display: flex; align-items: center; gap: 0;
}
.stat-item {
  padding: 12px 28px 12px 0;
  border-right: 1px solid #3a3a34;
  margin-right: 28px;
}
.stat-item:last-child { border-right: none; }
.stat-val { font-size: 24px; font-weight: 500; color: var(--cream); line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px; }
.stat-gold .stat-val { color: var(--gold); }

/* FILTER BAR */
.filter-bar {
  background: var(--cream-dark);
  border-bottom: 1px solid var(--border);
  padding: 10px 32px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.filter-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-right: 4px; }
.filter-pill {
  font-size: 11px; padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--white); color: var(--mid);
  cursor: pointer; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.3px;
}
.filter-pill:hover { border-color: var(--gold); color: var(--gold-text, var(--gold)); }
.filter-pill.active-a { background: var(--tier-a-bg); color: var(--tier-a-text); border-color: var(--tier-a-border); font-weight: 500; }
.filter-pill.active-b { background: var(--tier-b-bg); color: var(--tier-b-text); border-color: var(--tier-b-border); font-weight: 500; }
.filter-pill.active-c { background: var(--tier-c-bg); color: var(--tier-c-text); border-color: var(--tier-c-border); font-weight: 500; }
.filter-pill.active-dw { background: var(--dw-bg); color: var(--dw-text); border-color: var(--dw-border); font-weight: 500; }
.filter-pill.clear-btn { margin-left: auto; border-style: dashed; }

/* MAIN LAYOUT */
.main-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: calc(100vh - 160px);
}

/* SIDEBAR */
.sidebar {
  background: var(--white);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  position: sticky;
  top: 64px;
  height: calc(100vh - 64px);
}
.sidebar-section-label {
  font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--muted); padding: 16px 20px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--cream-dark);
  position: sticky; top: 0; z-index: 1;
}
.dept-item {
  padding: 12px 20px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
  border-left: 3px solid transparent;
}
.dept-item:hover { background: var(--cream); }
.dept-item.active {
  background: var(--gold-pale);
  border-left-color: var(--gold);
}
.dept-name {
  font-size: 13px; font-weight: 500; color: var(--dark);
  line-height: 1.3;
}
.dept-item.active .dept-name { color: var(--gold); }
.dept-meta { display: flex; gap: 6px; margin-top: 4px; align-items: center; }
.dept-count { font-size: 11px; color: var(--muted); }
.dept-tiers { display: flex; gap: 3px; }
.mini-badge {
  font-size: 9px; padding: 1px 5px; border-radius: 8px; font-weight: 500;
}
.mini-a { background: var(--tier-a-bg); color: var(--tier-a-text); }
.mini-b { background: var(--tier-b-bg); color: var(--tier-b-text); }
.mini-c { background: var(--tier-c-bg); color: var(--tier-c-text); }
.mini-dw { background: var(--dw-bg); color: var(--dw-text); }

/* CONTENT */
.content-area { padding: 0; background: var(--cream); }

.dept-header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 24px 32px 20px;
}
.dept-header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
.dept-header-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 500; color: var(--dark);
  letter-spacing: 0.3px;
}
.dept-header-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
.dept-stats { display: flex; gap: 16px; margin-top: 14px; }
.dept-stat {
  background: var(--cream-dark); border-radius: 3px;
  padding: 8px 16px; text-align: center;
  border: 1px solid var(--border);
}
.dept-stat-val { font-size: 18px; font-weight: 500; color: var(--dark); }
.dept-stat-lbl { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

.print-btn {
  background: none; border: 1px solid var(--border);
  color: var(--mid); font-family: 'DM Sans', sans-serif;
  font-size: 11px; padding: 7px 16px; border-radius: 3px;
  cursor: pointer; letter-spacing: 0.5px;
  transition: all 0.15s; white-space: nowrap;
}
.print-btn:hover { border-color: var(--gold); color: var(--gold); }

/* STAFF CARDS */
.cards-grid { padding: 24px 32px; display: flex; flex-direction: column; gap: 16px; }

.staff-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.staff-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

.staff-card-header {
  padding: 16px 20px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none;
}
.staff-card-left { display: flex; align-items: center; gap: 14px; }
.staff-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; font-weight: 600;
  flex-shrink: 0;
}
.avatar-a { background: var(--tier-a-bg); color: var(--tier-a-text); }
.avatar-b { background: var(--tier-b-bg); color: var(--tier-b-text); }
.avatar-c { background: var(--tier-c-bg); color: var(--tier-c-text); }
.avatar-dw { background: var(--dw-bg); color: var(--dw-text); }

.staff-name { font-size: 15px; font-weight: 500; color: var(--dark); }
.staff-role { font-size: 12px; color: var(--muted); margin-top: 2px; }
.staff-card-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.tier-badge {
  font-size: 10px; font-weight: 500; padding: 3px 10px; border-radius: 10px;
  letter-spacing: 0.5px;
}
.tier-a { background: var(--tier-a-bg); color: var(--tier-a-text); border: 1px solid var(--tier-a-border); }
.tier-b { background: var(--tier-b-bg); color: var(--tier-b-text); border: 1px solid var(--tier-b-border); }
.tier-c { background: var(--tier-c-bg); color: var(--tier-c-text); border: 1px solid var(--tier-c-border); }
.tier-dw { background: var(--dw-bg); color: var(--dw-text); border: 1px solid var(--dw-border); }

.dw-tag {
  font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--dw-text); background: var(--dw-bg);
  padding: 2px 7px; border-radius: 8px;
  border: 1px solid var(--dw-border);
}

.chevron { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }

/* KPI BODY */
.staff-card-body { display: none; padding: 0; }
.staff-card-body.open { display: block; }

.kpi-section-label {
  font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--muted); padding: 12px 20px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--cream-dark);
}

.kpi-meta-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 0; border-bottom: 1px solid var(--border);
}
.kpi-meta-cell {
  padding: 12px 20px; border-right: 1px solid var(--border);
}
.kpi-meta-cell:last-child { border-right: none; }
.kpi-meta-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.kpi-meta-value { font-size: 13px; font-weight: 500; color: var(--dark); }

.kpi-list { padding: 4px 0 8px; }
.kpi-row {
  display: grid;
  grid-template-columns: 28px 1fr 180px 120px 110px;
  align-items: start;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  transition: background 0.12s;
}
.kpi-row:hover { background: var(--cream); }
.kpi-row:last-child { border-bottom: none; }
.kpi-num {
  font-size: 11px; color: var(--muted);
  font-family: 'Cormorant Garamond', serif;
  padding-top: 1px;
}
.kpi-name { font-size: 13px; color: var(--dark); font-weight: 500; line-height: 1.4; }
.kpi-target { font-size: 12px; color: var(--mid); line-height: 1.4; }
.kpi-source {
  font-size: 11px; color: var(--gold);
  background: var(--gold-pale); padding: 3px 8px;
  border-radius: 3px; line-height: 1.4;
  border: 1px solid #e8d090;
}
.kpi-freq {
  font-size: 11px; color: var(--mid);
  background: var(--cream-dark); padding: 3px 8px;
  border-radius: 3px; text-align: center;
  border: 1px solid var(--border);
}
.kpi-status-pending {
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--muted); padding: 3px 8px;
  border: 1px dashed var(--border); border-radius: 3px;
  text-align: center;
}

.kpi-col-header {
  display: grid;
  grid-template-columns: 28px 1fr 180px 120px 110px;
  gap: 12px; padding: 8px 20px;
  background: var(--cream-dark);
  border-bottom: 1px solid var(--border);
}
.kpi-col-lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

/* EMPTY STATE */
.empty-state {
  padding: 80px 32px; text-align: center; color: var(--muted);
}
.empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }
.empty-text { font-size: 14px; }

/* PRINT */
@media print {
  #pin-screen, .top-bar, .filter-bar, .sidebar, .print-btn, .lock-btn { display: none !important; }
  .main-layout { grid-template-columns: 1fr; }
  .staff-card-body { display: block !important; }
  .content-area { padding: 0; }
  body { background: white; }
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--cream-dark); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* NO RESULTS */
.no-results {
  padding: 60px 32px; text-align: center;
  color: var(--muted); font-size: 14px;
}
</style>
</head>

    <button class="filter-pill" id="pill-c" onclick="toggleFilter('C')">Tier C &mdash; Operational</button>
    <button class="filter-pill" id="pill-dw" onclick="toggleFilter('DW')">Daily Wage</button>
    <button class="filter-pill clear-btn" onclick="clearFilters()">Clear filters</button>
  </div>

  <!-- MAIN -->
  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-section-label">Departments</div>
      <div id="sidebar-list"></div>
    </div>
    <div class="content-area" id="content-area">

        <div class="empty-icon">&#9776;</div>
        <div class="empty-text">Select a department from the sidebar</div>

  </div>

</div>

let activeDept = null;
let tierFilter = null;
let dwFilter = false;
let openCards = new Set();

// ─── PIN ─────────────────────────────────────────────────────────────────────
const CORRECT_PIN = '1234';
let pinEntry = '';

function pinPress(n) {
  if (pinEntry.length >= 4) return;
  pinEntry += n;
  updateDots();
  if (pinEntry.length === 4) {
    setTimeout(() => {
      if (pinEntry === CORRECT_PIN) {
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        render();
      } else {
        document.getElementById('pin-error').classList.add('show');
        setTimeout(() => { pinEntry = ''; updateDots(); document.getElementById('pin-error').classList.remove('show'); }, 900);
      }
    }, 150);
  }
}
function pinBack() { pinEntry = pinEntry.slice(0,-1); updateDots(); }
function pinClear() { pinEntry = ''; updateDots(); }
function updateDots() {
  for (let i=0;i<4;i++) {
    document.getElementById('d'+i).className = 'pin-dot' + (i < pinEntry.length ? ' filled' : '');
  }
}
function lockPortal() {
  pinEntry = '';
  updateDots();
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  openCards.clear();
}

// ─── FILTER / RENDER ─────────────────────────────────────────────────────────
function toggleFilter(t) {
  if (t === 'DW') { dwFilter = !dwFilter; }
  else { tierFilter = tierFilter === t ? null : t; }
  render();
}
function clearFilters() {
  tierFilter = null; dwFilter = false;
  document.getElementById('search-input').value = '';
  render();
}

function filteredStaff() {
  const q = document.getElementById('search-input').value.toLowerCase();
  return STAFF.filter(s => {
    if (tierFilter && s.tier !== tierFilter) return false;
    if (dwFilter && !s.dw) return false;
    if (q && !s.name.toLowerCase().includes(q) && !s.role.toLowerCase().includes(q) && !s.dept.toLowerCase().includes(q)) return false;
    return true;
  });
}

function getDepts(list) {
  const m = {};
  list.forEach(s => { if (!m[s.dept]) m[s.dept] = []; m[s.dept].push(s); });
  return m;
}

function initials(name) {
  return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

function avatarClass(s) {
  if (s.dw) return 'avatar-dw';
  if (s.tier==='A') return 'avatar-a';
  if (s.tier==='B') return 'avatar-b';
  return 'avatar-c';
}
function tierClass(s) {
  if (s.dw) return 'tier-dw';
  if (s.tier==='A') return 'tier-a';
  if (s.tier==='B') return 'tier-b';
  return 'tier-c';
}
function tierLabel(s) {
  if (s.dw) return 'Daily Wage';
  return 'Tier ' + s.tier;
}

function render() {
  const list = filteredStaff();
  const dm = getDepts(list);
  const depts = Object.keys(dm);

  if (activeDept && !depts.includes(activeDept)) activeDept = depts[0] || null;
  if (!activeDept && depts.length) activeDept = depts[0];

  const tA = list.filter(s=>s.tier==='A').length;
  const tB = list.filter(s=>s.tier==='B').length;
  const tC = list.filter(s=>s.tier==='C'&&!s.dw).length;
  const dw = list.filter(s=>s.dw).length;

  document.getElementById('stat-bar').innerHTML = `
    <div class="stat-item"><div class="stat-val">${list.length}</div><div class="stat-lbl">Staff in scope</div></div>
    <div class="stat-item"><div class="stat-val">${depts.length}</div><div class="stat-lbl">Departments</div></div>
    <div class="stat-item stat-gold"><div class="stat-val">${tA}</div><div class="stat-lbl">Tier A</div></div>
    <div class="stat-item"><div class="stat-val" style="color:#2a6a2a">${tB}</div><div class="stat-lbl">Tier B</div></div>
    <div class="stat-item"><div class="stat-val">${tC}</div><div class="stat-lbl">Tier C</div></div>
    <div class="stat-item"><div class="stat-val" style="color:#5a3a7a">${dw}</div><div class="stat-lbl">Daily Wage</div></div>
    <div class="stat-item" style="margin-left:auto;border-right:none;padding-right:0">
      <div style="font-size:10px;color:#4a4a42;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px">System</div>
      <div style="font-size:11px;color:#6a6a60">MJSR-KPI-MASTER v1.0 &nbsp;|&nbsp; Phase 1</div>
    </div>
  `;

  ['A','B','C'].forEach(t => {
    const el = document.getElementById('pill-'+t.toLowerCase());
    el.className = 'filter-pill' + (tierFilter===t ? ' active-'+t.toLowerCase() : '');
  });
  document.getElementById('pill-dw').className = 'filter-pill' + (dwFilter ? ' active-dw' : '');

  // Sidebar
  document.getElementById('sidebar-list').innerHTML = depts.map(d => {
    const members = dm[d];
    const cA = members.filter(s=>s.tier==='A'&&!s.dw).length;
    const cB = members.filter(s=>s.tier==='B'&&!s.dw).length;
    const cC = members.filter(s=>s.tier==='C'&&!s.dw).length;
    const cDW = members.filter(s=>s.dw).length;
    return `<div class="dept-item${activeDept===d?' active':''}" onclick="setDept(${JSON.stringify(d)})">
      <div class="dept-name">${d}</div>
      <div class="dept-meta">
        <span class="dept-count">${members.length} staff</span>
        <div class="dept-tiers">
          ${cA?`<span class="mini-badge mini-a">A:${cA}</span>`:''}
          ${cB?`<span class="mini-badge mini-b">B:${cB}</span>`:''}
          ${cC?`<span class="mini-badge mini-c">C:${cC}</span>`:''}
          ${cDW?`<span class="mini-badge mini-dw">DW:${cDW}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');

  // Content
  if (!activeDept || !dm[activeDept]) {
    document.getElementById('content-area').innerHTML = `<div class="empty-state"><div class="empty-icon">&#9776;</div><div class="empty-text">Select a department from the sidebar</div></div>`;
    return;
  }

  const members = dm[activeDept];
  const dA = members.filter(s=>s.tier==='A'&&!s.dw).length;
  const dB = members.filter(s=>s.tier==='B'&&!s.dw).length;
  const dC = members.filter(s=>s.tier==='C'&&!s.dw).length;
  const dDW = members.filter(s=>s.dw).length;
  const totalKPIs = members.reduce((a,s)=>a+getKPIs(s.role).length,0);

  const cards = members.map(s => {
    const kpis = getKPIs(s.role);
    const cardId = 'card-'+s.name.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
    const isOpen = openCards.has(cardId);
    const freqSummary = [...new Set(kpis.map(k=>k.f))].join(' / ');
    return `
    <div class="staff-card" id="${cardId}">
      <div class="staff-card-header" onclick="toggleCard('${cardId}')">
        <div class="staff-card-left">
          <div class="staff-avatar ${avatarClass(s)}">${initials(s.name)}</div>
          <div>
            <div class="staff-name">${s.name}</div>
            <div class="staff-role">${s.role}</div>
          </div>
        </div>
        <div class="staff-card-right">
          <span style="font-size:11px;color:var(--muted)">${kpis.length} KPIs &nbsp;|&nbsp; ${freqSummary}</span>
          ${s.dw ? '<span class="dw-tag">Daily Wage</span>' : ''}
          <span class="tier-badge ${tierClass(s)}">${tierLabel(s)}</span>
          <span class="chevron${isOpen?' open':''}">&#9660;</span>
        </div>
      </div>
      <div class="staff-card-body${isOpen?' open':''}">
        <div class="kpi-col-header">
          <div class="kpi-col-lbl">#</div>
          <div class="kpi-col-lbl">KPI</div>
          <div class="kpi-col-lbl">Target</div>
          <div class="kpi-col-lbl">Evidence source</div>
          <div class="kpi-col-lbl">Frequency</div>
        </div>
        <div class="kpi-list">
          ${kpis.map((k,i)=>`
          <div class="kpi-row">
            <div class="kpi-num">${i+1}</div>
            <div class="kpi-name">${k.n}</div>
            <div class="kpi-target">${k.t}</div>
            <div class="kpi-source">${k.s}</div>
            <div class="kpi-freq">${k.f}</div>
          </div>`).join('')}
        </div>
        <div style="padding:10px 20px;background:var(--cream-dark);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:11px;color:var(--muted);letter-spacing:.5px">Scoring: Phase 2 &mdash; Evidence upload enabled after KPI definitions finalised</span>
          <button class="print-btn" onclick="printCard('${cardId}','${s.name}')">Print KPI card</button>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content-area').innerHTML = `
    <div class="dept-header">
      <div class="dept-header-top">
        <div>
          <div class="dept-header-name">${activeDept}</div>
          <div class="dept-header-sub">${members.length} staff &nbsp;&mdash;&nbsp; Click any card to expand KPI detail</div>
        </div>
        <button class="print-btn" onclick="window.print()">Print department</button>
      </div>
      <div class="dept-stats">
        ${dA?`<div class="dept-stat"><div class="dept-stat-val" style="color:var(--tier-a-text)">${dA}</div><div class="dept-stat-lbl">Tier A</div></div>`:''}
        ${dB?`<div class="dept-stat"><div class="dept-stat-val" style="color:var(--tier-b-text)">${dB}</div><div class="dept-stat-lbl">Tier B</div></div>`:''}
        ${dC?`<div class="dept-stat"><div class="dept-stat-val">${dC}</div><div class="dept-stat-lbl">Tier C</div></div>`:''}
        ${dDW?`<div class="dept-stat"><div class="dept-stat-val" style="color:var(--dw-text)">${dDW}</div><div class="dept-stat-lbl">Daily Wage</div></div>`:''}
        <div class="dept-stat"><div class="dept-stat-val" style="color:var(--gold)">${totalKPIs}</div><div class="dept-stat-lbl">Total KPIs</div></div>
      </div>
    </div>
    <div class="cards-grid">${cards}</div>
  `;
}

function setDept(d) {
  activeDept = d;
  openCards.clear();
  render();
  document.getElementById('content-area').scrollTop = 0;
}

function toggleCard(id) {
  if (openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  const body = document.querySelector('#'+id+' .staff-card-body');
  const chev = document.querySelector('#'+id+' .chevron');
  if (body) body.classList.toggle('open', openCards.has(id));
  if (chev) chev.classList.toggle('open', openCards.has(id));
}

function printCard(cardId, name) {
  const card = document.getElementById(cardId);
  const body = card.querySelector('.staff-card-body');
  const wasOpen = openCards.has(cardId);
  if (!wasOpen) { openCards.add(cardId); body.classList.add('open'); }
  window.print();
  if (!wasOpen) { openCards.delete(cardId); body.classList.remove('open'); }
}
</script>
</body>
</html>
